<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Rands Kiosk | Event Tickets</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    transition: background-color 0.3s ease, color 0.3s ease;
  }
  body.dark-mode {
    background: #0A0A0A;
  }
  body.dark-mode .tickets-page {
    background: linear-gradient(135deg, #0A0A0A 0%, #1A1A1A 100%);
  }
  body.dark-mode .menu-header, body.dark-mode .category-nav {
    background: rgba(10, 10, 10, 0.95);
  }
  body.dark-mode .ticket-card {
    background: rgba(17, 17, 17, 0.9);
    border: 1px solid rgba(227,27,35,0.2);
  }
  body.dark-mode .ticket-type, body.dark-mode .ticket-price, body.dark-mode .ticket-description, 
  body.dark-mode .features-list li, body.dark-mode .quantity-display {
    color: white;
  }
  body.dark-mode .cart-sidebar {
    background: #111111;
  }
  body.light-mode {
    background: #F5F5F5;
  }
  body.light-mode .tickets-page {
    background: linear-gradient(135deg, #FFFFFF 0%, #F0F0F0 100%);
  }
  body.light-mode .menu-header, body.light-mode .category-nav {
    background: rgba(255, 255, 255, 0.95);
  }
  body.light-mode .ticket-card {
    background: rgba(255, 255, 255, 0.95);
    border: 1px solid rgba(227,27,35,0.2);
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  body.light-mode .ticket-type, body.light-mode .ticket-price, body.light-mode .ticket-description, 
  body.light-mode .features-list li, body.light-mode .quantity-display {
    color: #1F2937;
  }
  body.light-mode .cart-sidebar {
    background: #FFFFFF;
  }
  
  .tickets-page {
    min-height: 100vh;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .menu-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  body.dark-mode .menu-bg::before {
    content: '';
    position: absolute;
    width: 150%;
    height: 150%;
    top: -25%;
    left: -25%;
    background: radial-gradient(circle at 30% 40%, rgba(227,27,35,0.05), transparent 70%);
    animation: slowDrift 40s infinite linear;
  }
  body.light-mode .menu-bg::before {
    content: '';
    position: absolute;
    width: 150%;
    height: 150%;
    top: -25%;
    left: -25%;
    background: radial-gradient(circle at 30% 40%, rgba(227,27,35,0.03), transparent 70%);
    animation: slowDrift 40s infinite linear;
  }
  @keyframes slowDrift {
    0% { transform: rotate(0deg) scale(1); }
    100% { transform: rotate(360deg) scale(1.2); }
  }
  .menu-header {
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px);
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .logo-area {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo-image {
    width: 90px;
    height: 90px;
    max-height: 90px;
    object-fit: cover;
    border-radius: 50%;
    box-shadow: 0 6px 14px rgba(0, 0, 0, 0.2);
    border: 2px solid rgba(227,27,35,0.3);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    background: #fff;
  }
  .logo-image:hover {
    transform: scale(1.02);
    box-shadow: 0 8px 20px rgba(227,27,35,0.3);
    border-color: #E31B23;
  }
  @media (max-width: 768px) {
    .logo-image { width: 70px; height: 70px; }
    .logo-area h1 { font-size: 1.4rem; }
  }
  .logo-area h1 {
    font-size: 1.9rem;
    color: #E31B23;
    letter-spacing: -0.5px;
  }
  .header-controls {
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .theme-toggle {
    background: rgba(227,27,35,0.15);
    border: 1px solid rgba(227,27,35,0.4);
    padding: 0.6rem 1rem;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .theme-toggle:hover {
    background: #E31B23;
    color: white;
  }
  .cart-btn {
    background: rgba(227,27,35,0.15);
    border: 1px solid rgba(227,27,35,0.4);
    padding: 0.6rem 1.2rem;
    border-radius: 40px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .cart-btn:hover {
    background: #E31B23;
    transform: scale(1.02);
    color: white;
  }
  .cart-price {
    font-weight: 700;
    font-size: 0.9rem;
  }
  .category-nav {
    position: sticky;
    top: 70px;
    z-index: 90;
    backdrop-filter: blur(20px);
    padding: 0.8rem 2rem;
    display: flex;
    gap: 0.8rem;
    overflow-x: auto;
    scrollbar-width: thin;
  }
  .category-nav::-webkit-scrollbar {
    height: 3px;
  }
  .category-nav::-webkit-scrollbar-thumb {
    background: #E31B23;
    border-radius: 10px;
  }
  .category-tab {
    background: transparent;
    border: 1px solid;
    padding: 0.5rem 1.2rem;
    border-radius: 40px;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  body.dark-mode .category-tab {
    color: white;
    border-color: rgba(255,255,255,0.3);
  }
  body.light-mode .category-tab {
    color: black;
    border-color: rgba(0,0,0,0.2);
  }
  .category-tab:hover, .category-tab.active {
    background: #E31B23;
    border-color: #E31B23;
    color: white !important;
  }
  .menu-main {
    position: relative;
    z-index: 10;
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem;
    flex: 1;
    width: 100%;
  }
  .tickets-container {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 30px;
  }
  .ticket-card {
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
    transition: all 0.4s ease;
    position: relative;
    display: flex;
    flex-direction: column;
    cursor: pointer;
  }
  .ticket-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 25px 45px rgba(227, 6, 19, 0.25);
  }
  /* Ticket Theme Styles - keeping original gradient colors */
  .ticket-card.general-ticket {
    background: linear-gradient(145deg, #1E3A8A, #1E40AF);
    border: 1px solid rgba(255,255,255,0.25);
  }
  body.light-mode .ticket-card.general-ticket {
    background: linear-gradient(145deg, #3B82F6, #2563EB);
    box-shadow: 0 10px 25px -5px rgba(59,130,246,0.4);
  }
  .ticket-card.vip-experience {
    background: linear-gradient(145deg, #800020, #5e0018);
    border: 1px solid rgba(255,215,0,0.3);
  }
  body.light-mode .ticket-card.vip-experience {
    background: linear-gradient(145deg, #9b2c3d, #6a1e2b);
    box-shadow: 0 10px 25px -5px rgba(128,0,32,0.5);
  }
  .ticket-card.paradise {
    background: linear-gradient(145deg, #0F5C5F, #1E7F6E);
    border: 1px solid rgba(255,255,200,0.3);
  }
  body.light-mode .ticket-card.paradise {
    background: linear-gradient(145deg, #1C9E8F, #117F6F);
    box-shadow: 0 10px 25px -5px rgba(28,158,143,0.4);
  }
  .ticket-card.see-you-vibe {
    background: linear-gradient(145deg, #E85D04, #F48C06);
    border: 1px solid rgba(255,200,100,0.4);
  }
  body.light-mode .ticket-card.see-you-vibe {
    background: linear-gradient(145deg, #F77F00, #FC9E2F);
    box-shadow: 0 10px 25px -5px rgba(248,127,0,0.5);
  }
  .ticket-card.wonderland {
    background: linear-gradient(145deg, #4C1D95, #7C3AED);
    border: 1px solid rgba(200,150,255,0.3);
  }
  body.light-mode .ticket-card.wonderland {
    background: linear-gradient(145deg, #6D28D9, #8B5CF6);
    box-shadow: 0 10px 25px -5px rgba(109,40,217,0.4);
  }
  .ticket-header {
    padding: 28px 24px;
    position: relative;
    overflow: hidden;
  }
  .ticket-type {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  /* Text colors - white on dark backgrounds, dark on light mode for contrast */
  body.dark-mode .ticket-type,
  body.dark-mode .ticket-price,
  body.dark-mode .ticket-description {
    color: white;
    text-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }
  body.light-mode .ticket-type,
  body.light-mode .ticket-price,
  body.light-mode .ticket-description {
    color: white;
    text-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }
  /* But for light mode, text stays white on colored backgrounds - that's the design */
  .ticket-price {
    font-size: 2.5rem;
    font-weight: 800;
    margin: 15px 0;
  }
  .ticket-description {
    font-size: 0.95rem;
    line-height: 1.5;
    opacity: 0.9;
    margin-top: 10px;
  }
  .ticket-body {
    padding: 20px 24px;
    flex: 1;
  }
  .features-list {
    list-style: none;
  }
  .features-list li {
    padding: 10px 0;
    border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
    display: flex;
    align-items: center;
    font-size: 0.9rem;
  }
  body.dark-mode .features-list li {
    color: white;
  }
  body.light-mode .features-list li {
    color: white;
  }
  .feature-icon {
    margin-right: 12px;
    width: 24px;
    text-align: center;
  }
  .feature-icon i {
    color: white;
  }
  .quantity-selector {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 20px 0 10px;
    background: rgba(0,0,0,0.25);
    border-radius: 60px;
    padding: 6px;
    gap: 12px;
  }
  .quantity-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    font-size: 1.3rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    background: rgba(255,255,255,0.25);
    color: white;
  }
  .quantity-btn:hover {
    background: rgba(255,255,255,0.5);
    transform: scale(1.05);
  }
  .quantity-display {
    font-size: 1.3rem;
    font-weight: 700;
    min-width: 50px;
    text-align: center;
  }
  body.dark-mode .quantity-display {
    color: white;
  }
  body.light-mode .quantity-display {
    color: white;
  }
  .ticket-footer {
    padding: 20px 24px 28px;
    text-align: center;
  }
  .buy-btn {
    border: none;
    padding: 14px 24px;
    border-radius: 60px;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    width: 100%;
    letter-spacing: 0.5px;
    transition: all 0.3s ease;
  }
  .general-ticket .buy-btn {
    background: white;
    color: #1E3A8A;
  }
  .vip-experience .buy-btn {
    background: #FFD966;
    color: #5e0018;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .paradise .buy-btn {
    background: #FFE7A3;
    color: #0F5C5F;
  }
  .see-you-vibe .buy-btn {
    background: #FFDEA5;
    color: #B23C00;
  }
  .wonderland .buy-btn {
    background: #D9B8FF;
    color: #2E1065;
  }
  .buy-btn:hover {
    transform: scale(1.02);
    filter: brightness(1.05);
  }
  .popular-badge {
    position: absolute;
    top: 20px;
    right: -35px;
    background: #E31B23;
    color: white;
    padding: 8px 40px;
    font-weight: 700;
    font-size: 0.85rem;
    transform: rotate(45deg);
    box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
    z-index: 20;
  }
  .cart-sidebar {
    position: fixed;
    right: 0;
    top: 0;
    width: 420px;
    height: 100vh;
    z-index: 200;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
    box-shadow: -5px 0 30px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  body.dark-mode .cart-sidebar {
    background: #111111;
  }
  body.light-mode .cart-sidebar {
    background: #FFFFFF;
  }
  .cart-sidebar.open { transform: translateX(0); }
  .cart-header { 
    padding: 1.2rem 1.5rem; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    border-bottom: 1px solid rgba(227,27,35,0.2); 
    position: sticky; 
    top: 0; 
    background: inherit; 
    z-index: 1; 
    backdrop-filter: blur(8px);
  }
  body.dark-mode .cart-header h3 { color: white; }
  body.light-mode .cart-header h3 { color: #1F2937; }
  .close-cart { 
    background: none; 
    border: none; 
    font-size: 1.5rem; 
    cursor: pointer;
  }
  body.dark-mode .close-cart { color: white; }
  body.light-mode .close-cart { color: #1F2937; }
  .cart-items { 
    flex: none; 
    overflow-y: visible; 
    padding: 1rem; 
  }
  .cart-item { 
    display: flex; 
    gap: 0.8rem; 
    padding: 0.8rem; 
    border-radius: 20px; 
    margin-bottom: 0.8rem; 
    align-items: center; 
    background: rgba(227,27,35,0.1); 
  }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-weight: 600; font-size: 0.9rem; }
  body.dark-mode .cart-item-name { color: white; }
  body.light-mode .cart-item-name { color: #1F2937; }
  .cart-item-price { color: #E31B23; font-size: 0.75rem; font-weight: 600; }
  .cart-item-qty { 
    display: flex; 
    align-items: center; 
    gap: 8px; 
    background: rgba(0,0,0,0.2); 
    border-radius: 30px; 
    padding: 0.2rem 0.5rem; 
  }
  .qty-control { 
    border: none; 
    width: 28px; 
    height: 28px; 
    border-radius: 50%; 
    font-weight: bold; 
    cursor: pointer; 
    background: #E31B23; 
    color: white; 
  }
  .cart-total { 
    padding: 1rem 1.5rem; 
    border-top: 1px solid rgba(227,27,35,0.2); 
  }
  .total-row { 
    display: flex; 
    justify-content: space-between; 
    font-size: 1rem; 
    font-weight: 700; 
    margin-bottom: 0.5rem; 
  }
  body.dark-mode .total-row { color: white; }
  body.light-mode .total-row { color: #1F2937; }
  .checkout-btn { 
    width: calc(100% - 2rem); 
    margin: 1rem; 
    padding: 0.8rem; 
    background: #E31B23; 
    border: none; 
    border-radius: 40px; 
    color: white; 
    font-weight: 600; 
    cursor: pointer; 
    font-size: 1rem; 
  }
  .cart-overlay { 
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%; 
    background: rgba(0,0,0,0.7); 
    z-index: 199; 
    opacity: 0; 
    visibility: hidden; 
  }
  .cart-overlay.open { opacity: 1; visibility: visible; }
  .toast { 
    position: fixed; 
    bottom: 30px; 
    left: 50%; 
    transform: translateX(-50%); 
    background: #1F1F1F; 
    color: white; 
    padding: 0.6rem 1.2rem; 
    border-radius: 40px; 
    font-size: 0.8rem; 
    z-index: 300; 
    opacity: 0; 
    transition: opacity 0.2s; 
    pointer-events: none; 
    border-left: 3px solid #E31B23; 
  }
  .toast.show { opacity: 1; }
  .footer { 
    text-align: center; 
    padding: 1.5rem; 
    font-size: 0.7rem; 
  }
  body.dark-mode .footer { color: #6B7280; }
  body.light-mode .footer { color: #6B7280; }
  @media (max-width: 768px) {
    .tickets-container { grid-template-columns: 1fr; }
    .cart-sidebar { width: 100%; }
  }
  .flying-item { 
    position: fixed; 
    z-index: 1000; 
    font-size: 2rem; 
    pointer-events: none; 
    transition: all 1s cubic-bezier(0.2, 0.9, 0.4, 1.2); 
    filter: drop-shadow(0 0 8px #E31B23); 
    will-change: transform, left, top; 
  }
</style>
</head>
<body class="light-mode">
<div class="tickets-page">
  <div class="menu-bg"></div>

  <div class="menu-header">
    <div class="logo-area">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23E31B23'/%3E%3Ctext x='50' y='70' font-size='48' text-anchor='middle' fill='white' font-weight='bold'%3ER%3C/text%3E%3C/svg%3E" alt="Rands Kiosk Logo" class="logo-image">
      <h1>Rands Kiosk | Tickets</h1>
    </div>
    <div class="header-controls">
      <button class="theme-toggle" id="themeToggleBtn"><span>☀️</span><span>Light</span></button>
      <div class="cart-btn" id="openCartBtn"><span>🛒</span><span class="cart-price" id="cartPrice">R0</span></div>
    </div>
  </div>

  <div class="category-nav">
    <button class="category-tab active" data-category="tickets">🎟️ Event Tickets</button>
  </div>

  <div class="menu-main" id="menuMain"></div>
  <div class="footer">Rands Kiosk — Secure Your Spot | #SeeYourVibe</div>
</div>

<!-- Cart Sidebar -->
<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header"><h3>🛒 Your Tickets</h3><button class="close-cart" id="closeCartBtn">✕</button></div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-total"><div class="total-row"><span>Total</span><span id="cartTotal">R0</span></div></div>
  <button class="checkout-btn" id="checkoutBtn">💰 CHECKOUT</button>
</div>
<div id="toast" class="toast"></div>

<script>
  // Ticket Data - same as original kiosk
  const ticketProducts = [
    { id: 201, name: "General Ticket", price: 250, desc: "Standard wristband • General access to all areas.", emoji: "🎫", isTicket: true, features: ["Full event access", "Rands Smart Counter access", "Event wristband", "✗ VIP lounge"], hasQuantity: true, classSlug: "general-ticket" },
    { id: 202, name: "VIP Experience", price: 500, desc: "Premium wristband • Drinks included • Meet & greet", emoji: "🎫", isTicket: true, features: ["All General benefits", "VIP lounge access", "Complimentary drinks (3)", "Meet & greet with artists"], hasQuantity: true, popular: true, classSlug: "vip-experience" },
    { id: 203, name: "Paradise", price: 10000, desc: "Luxurious couch • Waiter service • R8,000 Tab • Skip Queue Priority • 15 people", emoji: "🎫", isTicket: true, features: ["Private table with couches", "Dedicated waiter", "R8,000 Tab", "Skip the Queue Priority"], hasQuantity: false, classSlug: "paradise" },
    { id: 204, name: "#See You Vibe", price: 15000, desc: "Luxury vibe • R13,000 Tab • Skip Queue Priority • 15 people", emoji: "🎫", isTicket: true, features: ["Premium lounge area", "Dedicated host", "R13,000 Tab", "Skip the Queue Priority"], hasQuantity: false, classSlug: "see-you-vibe" },
    { id: 205, name: "Wonderland", price: 20000, desc: "Ultimate wonderland • R18,000 Tab • VIP parking pass • 15 people", emoji: "🎫", isTicket: true, features: ["Private luxury suite", "Personal concierge", "R18,000 Tab", "VIP parking pass"], hasQuantity: false, classSlug: "wonderland" }
  ];

  let cart = [];

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  function redirectToHome() {
    showToast("✅ Order completed! Redirecting to home...");
    setTimeout(() => {
      window.location.href = "index.html";
    }, 2000);
  }

  function animateToCart(element, emoji) {
    const rect = element.getBoundingClientRect();
    const cartBtn = document.getElementById('openCartBtn');
    const cartRect = cartBtn.getBoundingClientRect();
    const flying = document.createElement('div');
    flying.className = 'flying-item';
    flying.innerHTML = emoji;
    flying.style.left = rect.left + rect.width/2 - 20 + 'px';
    flying.style.top = rect.top + rect.height/2 - 20 + 'px';
    document.body.appendChild(flying);
    setTimeout(() => {
      flying.style.left = cartRect.left + cartRect.width/2 - 20 + 'px';
      flying.style.top = cartRect.top + cartRect.height/2 - 20 + 'px';
      flying.style.transform = 'scale(0.3) rotate(360deg)';
    }, 10);
    setTimeout(() => {
      flying.remove();
      cartBtn.style.transform = 'scale(1.1)';
      setTimeout(() => cartBtn.style.transform = '', 200);
    }, 1000);
  }

  function updateCartUI() {
    const subtotal = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
    document.getElementById('cartPrice').textContent = `R${subtotal}`;
    document.getElementById('cartTotal').textContent = `R${subtotal}`;
    const cartItemsDiv = document.getElementById('cartItems');
    if (cart.length === 0) {
      cartItemsDiv.innerHTML = '<div style="text-align:center;padding:2rem;color:#6B7280;">No tickets selected</div>';
      return;
    }
    cartItemsDiv.innerHTML = cart.map(item => `
      <div class="cart-item">
        <div class="cart-item-info">
          <div class="cart-item-name">${item.emoji} ${item.name}</div>
          <div class="cart-item-price">R${item.price} each</div>
        </div>
        <div class="cart-item-qty">
          <button class="qty-control" onclick="updateQuantity(${item.id}, -1)">-</button>
          <span>${item.quantity}</span>
          <button class="qty-control" onclick="updateQuantity(${item.id}, 1)">+</button>
        </div>
        <button style="background:none;border:none;color:#9CA3AF;cursor:pointer;font-size:1.2rem;" onclick="removeItem(${item.id})">✕</button>
      </div>
    `).join('');
  }

  window.updateQuantity = function(id, delta) {
    const item = cart.find(i => i.id === id);
    if (item) {
      item.quantity += delta;
      if (item.quantity <= 0) cart = cart.filter(i => i.id !== id);
      updateCartUI();
    }
  };

  window.removeItem = function(id) {
    cart = cart.filter(i => i.id !== id);
    updateCartUI();
    showToast('Ticket removed');
  };

  function addToCart(product, element, quantity = 1) {
    if (element) animateToCart(element, product.emoji);
    const existing = cart.find(i => i.id === product.id);
    if (existing) {
      existing.quantity += quantity;
    } else {
      cart.push({ ...product, quantity });
    }
    updateCartUI();
    showToast(`✓ Added ${quantity} x ${product.emoji} ${product.name}`);
  }

  function renderTickets() {
    const container = document.getElementById('menuMain');
    container.innerHTML = `<div class="tickets-container">
      ${ticketProducts.map(p => `
        <div class="ticket-card ${p.classSlug}" data-ticket-id="${p.id}">
          <div class="ticket-header">
            ${p.popular ? '<div class="popular-badge">POPULAR</div>' : ''}
            <div class="ticket-type">${p.name}</div>
            <div class="ticket-price">R${p.price.toLocaleString()}</div>
            <p class="ticket-description">${p.desc}</p>
          </div>
          <div class="ticket-body">
            <ul class="features-list">
              ${p.features.map(f => `<li><span class="feature-icon"><i class="fas fa-${f.includes('✗') ? 'times-circle' : 'check-circle'}"></i></span> ${f}</li>`).join('')}
            </ul>
            ${p.hasQuantity ? `
              <div class="quantity-selector" data-ticket-id="${p.id}">
                <button class="quantity-btn minus">−</button>
                <span class="quantity-display">1</span>
                <button class="quantity-btn plus">+</button>
              </div>
            ` : ''}
          </div>
          <div class="ticket-footer">
            <button class="buy-btn" data-ticket-id="${p.id}" data-name="${p.name}" data-price="${p.price}">
              ${p.hasQuantity ? 'Add Tickets' : 'Book This Table'}
            </button>
          </div>
        </div>
      `).join('')}
    </div>`;

    // Attach quantity controls
    document.querySelectorAll('.quantity-selector').forEach(selector => {
      const minus = selector.querySelector('.minus');
      const plus = selector.querySelector('.plus');
      const display = selector.querySelector('.quantity-display');
      if (minus && plus && display) {
        minus.addEventListener('click', (e) => {
          e.stopPropagation();
          let val = parseInt(display.textContent);
          if (val > 1) display.textContent = val - 1;
        });
        plus.addEventListener('click', (e) => {
          e.stopPropagation();
          let val = parseInt(display.textContent);
          if (val < 50) display.textContent = val + 1;
        });
      }
    });

    // Attach buy button events
    document.querySelectorAll('.buy-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const ticketId = parseInt(btn.dataset.ticketId);
        const ticket = ticketProducts.find(t => t.id === ticketId);
        if (!ticket) return;
        const card = btn.closest('.ticket-card');
        let quantity = 1;
        if (ticket.hasQuantity) {
          const quantityDisplay = card.querySelector('.quantity-display');
          if (quantityDisplay) quantity = parseInt(quantityDisplay.textContent);
        }
        addToCart(ticket, card, quantity);
      });
    });

    // Card click for quick add
    document.querySelectorAll('.ticket-card').forEach(card => {
      card.addEventListener('click', (e) => {
        if (e.target.classList.contains('buy-btn') || e.target.classList.contains('quantity-btn') || e.target.closest('.quantity-selector')) return;
        const ticketId = parseInt(card.dataset.ticketId);
        const ticket = ticketProducts.find(t => t.id === ticketId);
        if (ticket) {
          let quantity = 1;
          if (ticket.hasQuantity) {
            const qtyDisplay = card.querySelector('.quantity-display');
            if (qtyDisplay) quantity = parseInt(qtyDisplay.textContent);
          }
          addToCart(ticket, card, quantity);
        }
      });
    });
  }

  function setupCartSidebar() {
    const cartSidebar = document.getElementById('cartSidebar');
    const cartOverlay = document.getElementById('cartOverlay');
    document.getElementById('openCartBtn').addEventListener('click', () => {
      cartSidebar.classList.add('open');
      cartOverlay.classList.add('open');
    });
    document.getElementById('closeCartBtn').addEventListener('click', () => {
      cartSidebar.classList.remove('open');
      cartOverlay.classList.remove('open');
    });
    cartOverlay.addEventListener('click', () => {
      cartSidebar.classList.remove('open');
      cartOverlay.classList.remove('open');
    });
  }

  function setupCheckout() {
    document.getElementById('checkoutBtn').addEventListener('click', () => {
      if (cart.length === 0) {
        showToast('Your cart is empty');
        return;
      }
      const total = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
      const ticketNames = cart.map(i => `${i.quantity}x ${i.name}`).join(', ');
      showToast(`✅ Order placed! Total: R${total}. Tickets: ${ticketNames}`);
      cart = [];
      updateCartUI();
      document.getElementById('cartSidebar').classList.remove('open');
      document.getElementById('cartOverlay').classList.remove('open');
      // Redirect to index.html after successful purchase
      redirectToHome();
    });
  }

  // Theme Toggle - preserving original behavior
  const themeToggle = document.getElementById('themeToggleBtn');
  function setTheme(theme) {
    if (theme === 'light') {
      document.body.classList.remove('dark-mode');
      document.body.classList.add('light-mode');
      themeToggle.innerHTML = '<span>☀️</span><span>Light</span>';
      localStorage.setItem('theme', 'light');
    } else {
      document.body.classList.remove('light-mode');
      document.body.classList.add('dark-mode');
      themeToggle.innerHTML = '<span>🌙</span><span>Dark</span>';
      localStorage.setItem('theme', 'dark');
    }
  }
  const savedTheme = localStorage.getItem('theme');
  if (savedTheme === 'dark') setTheme('dark');
  else setTheme('light');
  themeToggle.addEventListener('click', () => setTheme(document.body.classList.contains('dark-mode') ? 'light' : 'dark'));

  // Initialize
  renderTickets();
  setupCartSidebar();
  setupCheckout();
</script>
</body>
</html>
