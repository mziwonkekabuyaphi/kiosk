<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Rands Kiosk | Event Tickets & Packages</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; min-height: 100vh; overflow-x: hidden; transition: background-color 0.3s ease, color 0.3s ease; }
  body.dark-mode { background: #0A0A0A; }
  body.dark-mode .tickets-page { background: linear-gradient(135deg, #0A0A0A 0%, #1A1A1A 100%); }
  body.dark-mode .menu-header, body.dark-mode .category-nav { background: rgba(10, 10, 10, 0.95); }
  body.dark-mode .ticket-card { background: rgba(17, 17, 17, 0.9); border: 1px solid rgba(227,27,35,0.2); }
  body.dark-mode .ticket-type, body.dark-mode .ticket-price, body.dark-mode .ticket-description, 
  body.dark-mode .features-list li, body.dark-mode .quantity-display { color: white; }
  body.dark-mode .cart-sidebar { background: #111111; }
  body.light-mode { background: #F5F5F5; }
  body.light-mode .tickets-page { background: linear-gradient(135deg, #FFFFFF 0%, #F0F0F0 100%); }
  body.light-mode .menu-header, body.light-mode .category-nav { background: rgba(255, 255, 255, 0.95); }
  body.light-mode .ticket-card { background: rgba(255, 255, 255, 0.95); border: 1px solid rgba(227,27,35,0.2); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  body.light-mode .ticket-type, body.light-mode .ticket-price, body.light-mode .ticket-description, 
  body.light-mode .features-list li, body.light-mode .quantity-display { color: #1F2937; }
  body.light-mode .cart-sidebar { background: #FFFFFF; }
  
  .tickets-page { min-height: 100vh; position: relative; display: flex; flex-direction: column; }
  .menu-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
  body.dark-mode .menu-bg::before, body.light-mode .menu-bg::before {
    content: ''; position: absolute; width: 150%; height: 150%; top: -25%; left: -25%;
    background: radial-gradient(circle at 30% 40%, rgba(227,27,35,0.05), transparent 70%);
    animation: slowDrift 40s infinite linear;
  }
  @keyframes slowDrift { 0% { transform: rotate(0deg) scale(1); } 100% { transform: rotate(360deg) scale(1.2); } }
  .menu-header { position: sticky; top: 0; z-index: 100; backdrop-filter: blur(20px); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
  .logo-area { display: flex; align-items: center; gap: 16px; }
  .logo-image { width: 90px; height: 90px; max-height: 90px; object-fit: cover; border-radius: 50%; box-shadow: 0 6px 14px rgba(0, 0, 0, 0.2); border: 2px solid rgba(227,27,35,0.3); transition: transform 0.2s ease; background: #fff; }
  .logo-image:hover { transform: scale(1.02); border-color: #E31B23; }
  @media (max-width: 768px) { .logo-image { width: 70px; height: 70px; } .logo-area h1 { font-size: 1.4rem; } }
  .logo-area h1 { font-size: 1.9rem; color: #E31B23; letter-spacing: -0.5px; }
  .header-controls { display: flex; align-items: center; gap: 1rem; }
  .theme-toggle { background: rgba(227,27,35,0.15); border: 1px solid rgba(227,27,35,0.4); padding: 0.6rem 1rem; border-radius: 40px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
  .theme-toggle:hover { background: #E31B23; color: white; }
  .cart-btn { background: rgba(227,27,35,0.15); border: 1px solid rgba(227,27,35,0.4); padding: 0.6rem 1.2rem; border-radius: 40px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: all 0.2s; }
  .cart-btn:hover { background: #E31B23; transform: scale(1.02); color: white; }
  .cart-price { font-weight: 700; font-size: 0.9rem; }
  .category-nav { position: sticky; top: 70px; z-index: 90; backdrop-filter: blur(20px); padding: 0.8rem 2rem; display: flex; gap: 0.8rem; overflow-x: auto; scrollbar-width: thin; }
  .category-tab { background: transparent; border: 1px solid; padding: 0.5rem 1.2rem; border-radius: 40px; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  body.dark-mode .category-tab { color: white; border-color: rgba(255,255,255,0.3); }
  body.light-mode .category-tab { color: black; border-color: rgba(0,0,0,0.2); }
  .category-tab:hover, .category-tab.active { background: #E31B23; border-color: #E31B23; color: white !important; }
  .event-selector { background: rgba(0,0,0,0.05); border-radius: 60px; padding: 6px 12px; display: flex; align-items: center; gap: 12px; margin: 0 2rem 1rem 2rem; }
  .event-selector label { font-weight: 600; color: #E31B23; }
  #eventSelect { padding: 8px 16px; border-radius: 40px; border: 1px solid #E31B23; background: var(--bg-card); color: var(--text-primary); font-weight: 500; }
  .menu-main { position: relative; z-index: 10; max-width: 1400px; margin: 0 auto; padding: 2rem; flex: 1; width: 100%; }
  .tickets-container { width: 100%; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
  .ticket-card { border-radius: 24px; overflow: hidden; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3); transition: all 0.4s ease; position: relative; display: flex; flex-direction: column; cursor: pointer; }
  .ticket-card:hover { transform: translateY(-8px); box-shadow: 0 25px 45px rgba(227, 6, 19, 0.25); }
  /* Dynamic ticket backgrounds (colored by type) */
  .ticket-card.earlybird { background: linear-gradient(145deg, #1E3A8A, #1E40AF); border: 1px solid rgba(255,255,255,0.25); }
  body.light-mode .ticket-card.earlybird { background: linear-gradient(145deg, #3B82F6, #2563EB); }
  .ticket-card.general { background: linear-gradient(145deg, #0F5C5F, #1E7F6E); border: 1px solid rgba(255,255,200,0.3); }
  body.light-mode .ticket-card.general { background: linear-gradient(145deg, #1C9E8F, #117F6F); }
  .ticket-card.vip { background: linear-gradient(145deg, #800020, #5e0018); border: 1px solid rgba(255,215,0,0.3); }
  body.light-mode .ticket-card.vip { background: linear-gradient(145deg, #9b2c3d, #6a1e2b); }
  .ticket-card.package { background: linear-gradient(145deg, #E85D04, #F48C06); border: 1px solid rgba(255,200,100,0.4); }
  body.light-mode .ticket-card.package { background: linear-gradient(145deg, #F77F00, #FC9E2F); }
  .ticket-header { padding: 28px 24px; position: relative; overflow: hidden; }
  .ticket-type { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; letter-spacing: 1px; color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.2); }
  .ticket-price { font-size: 2.5rem; font-weight: 800; margin: 15px 0; color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.2); }
  .ticket-description { font-size: 0.95rem; line-height: 1.5; opacity: 0.9; margin-top: 10px; color: white; }
  .ticket-body { padding: 20px 24px; flex: 1; }
  .features-list { list-style: none; }
  .features-list li { padding: 10px 0; border-bottom: 1px dashed rgba(255, 255, 255, 0.2); display: flex; align-items: center; font-size: 0.9rem; color: white; }
  .feature-icon { margin-right: 12px; width: 24px; text-align: center; color: white; }
  .quantity-selector { display: flex; align-items: center; justify-content: center; margin: 20px 0 10px; background: rgba(0,0,0,0.25); border-radius: 60px; padding: 6px; gap: 12px; }
  .quantity-btn { width: 40px; height: 40px; border-radius: 50%; border: none; font-size: 1.3rem; font-weight: 700; cursor: pointer; background: rgba(255,255,255,0.25); color: white; }
  .quantity-btn:hover { background: rgba(255,255,255,0.5); transform: scale(1.05); }
  .quantity-display { font-size: 1.3rem; font-weight: 700; min-width: 50px; text-align: center; color: white; }
  .ticket-footer { padding: 20px 24px 28px; text-align: center; }
  .buy-btn { border: none; padding: 14px 24px; border-radius: 60px; font-weight: 700; font-size: 1rem; cursor: pointer; width: 100%; letter-spacing: 0.5px; transition: all 0.3s ease; }
  .earlybird .buy-btn, .general .buy-btn, .vip .buy-btn, .package .buy-btn { background: white; color: #1E3A8A; }
  .buy-btn:hover { transform: scale(1.02); filter: brightness(1.05); }
  .popular-badge { position: absolute; top: 20px; right: -35px; background: #E31B23; color: white; padding: 8px 40px; font-weight: 700; font-size: 0.85rem; transform: rotate(45deg); box-shadow: 0 3px 10px rgba(0,0,0,0.3); z-index: 20; }
  .cart-sidebar { position: fixed; right: 0; top: 0; width: 420px; height: 100vh; z-index: 200; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1); box-shadow: -5px 0 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; overflow-y: auto; background: #111; }
  body.light-mode .cart-sidebar { background: #FFFFFF; }
  .cart-sidebar.open { transform: translateX(0); }
  .cart-header { padding: 1.2rem 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(227,27,35,0.2); position: sticky; top: 0; background: inherit; z-index: 1; }
  .cart-header h3 { color: white; }
  body.light-mode .cart-header h3 { color: #1F2937; }
  .close-cart { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: white; }
  body.light-mode .close-cart { color: #1F2937; }
  .cart-items { flex: none; padding: 1rem; }
  .cart-item { display: flex; gap: 0.8rem; padding: 0.8rem; border-radius: 20px; margin-bottom: 0.8rem; align-items: center; background: rgba(227,27,35,0.1); }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-weight: 600; font-size: 0.9rem; color: white; }
  body.light-mode .cart-item-name { color: #1F2937; }
  .cart-item-price { color: #E31B23; font-size: 0.75rem; font-weight: 600; }
  .cart-item-qty { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.2); border-radius: 30px; padding: 0.2rem 0.5rem; }
  .qty-control { border: none; width: 28px; height: 28px; border-radius: 50%; font-weight: bold; cursor: pointer; background: #E31B23; color: white; }
  .cart-total { padding: 1rem 1.5rem; border-top: 1px solid rgba(227,27,35,0.2); }
  .total-row { display: flex; justify-content: space-between; font-size: 1rem; font-weight: 700; margin-bottom: 0.5rem; color: white; }
  body.light-mode .total-row { color: #1F2937; }
  .checkout-btn { width: calc(100% - 2rem); margin: 1rem; padding: 0.8rem; background: #E31B23; border: none; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; font-size: 1rem; }
  .cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 199; opacity: 0; visibility: hidden; }
  .cart-overlay.open { opacity: 1; visibility: visible; }
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1F1F1F; color: white; padding: 0.6rem 1.2rem; border-radius: 40px; font-size: 0.8rem; z-index: 300; opacity: 0; transition: opacity 0.2s; pointer-events: none; border-left: 3px solid #E31B23; }
  .toast.show { opacity: 1; }
  .footer { text-align: center; padding: 1.5rem; font-size: 0.7rem; color: #6B7280; }
  @media (max-width: 768px) { .tickets-container { grid-template-columns: 1fr; } .cart-sidebar { width: 100%; } .event-selector { margin: 0 1rem 1rem 1rem; flex-wrap: wrap; } }
  .flying-item { position: fixed; z-index: 1000; font-size: 2rem; pointer-events: none; transition: all 1s cubic-bezier(0.2, 0.9, 0.4, 1.2); filter: drop-shadow(0 0 8px #E31B23); will-change: transform; }
</style>
</head>
<body class="light-mode">
<div class="tickets-page">
  <div class="menu-bg"></div>
  <div class="menu-header">
    <div class="logo-area">
      <img src="images/rands-logo.png" alt="Rands Kiosk Logo" class="logo-image" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
      <h1>Rands Kiosk | Tickets</h1>
    </div>
    <div class="header-controls">
      <button class="theme-toggle" id="themeToggleBtn"><span>☀️</span><span>Light</span></button>
      <div class="cart-btn" id="openCartBtn"><span>🛒</span><span class="cart-price" id="cartPrice">R0</span></div>
    </div>
  </div>
  <div class="category-nav">
    <button class="category-tab active" data-category="tickets">🎟️ Event Tickets</button>
    <button class="category-tab" data-category="packages">🍾 Venue Packages</button>
  </div>
  <div class="event-selector" id="eventSelector" style="display: none;">
    <label><i class="fas fa-calendar-alt"></i> Active Event:</label>
    <select id="eventSelect"></select>
  </div>
  <div class="menu-main" id="menuMain"></div>
  <div class="footer">Rands Kiosk — Secure Your Spot | Tickets sync with Management System</div>
</div>

<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header"><h3>🛒 Your Cart</h3><button class="close-cart" id="closeCartBtn">✕</button></div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-total"><div class="total-row"><span>Total</span><span id="cartTotal">R0</span></div></div>
  <button class="checkout-btn" id="checkoutBtn">💰 CHECKOUT</button>
</div>
<div id="toast" class="toast"></div>

<script>
  // ========== STORAGE KEYS ==========
  const EVENTS_KEY = 'rands_events';
  const TICKETS_KEY = 'rands_tickets';
  
  let events = [];
  let selectedEventId = null;
  let cart = [];
  
  // Venue Packages (always available, not linked to event capacity)
  const VENUE_PACKAGES = [
    { id: 'pkg_paradise', name: 'Paradise', price: 10000, emoji: '🍾', desc: 'Luxurious couch • Waiter service • R8,000 Tab • Skip Queue Priority • 15 people', features: ['Private table with couches', 'Dedicated waiter', 'R8,000 Tab', 'Skip the Queue Priority'], hasQuantity: false, classSlug: 'package' },
    { id: 'pkg_vibe', name: '#See You Vibe', price: 15000, emoji: '🎧', desc: 'Luxury vibe • R13,000 Tab • Skip Queue Priority • 15 people', features: ['Premium lounge area', 'Dedicated host', 'R13,000 Tab', 'Skip the Queue Priority'], hasQuantity: false, classSlug: 'package' },
    { id: 'pkg_wonderland', name: 'Wonderland', price: 20000, emoji: '✨', desc: 'Ultimate wonderland • R18,000 Tab • VIP parking pass • 15 people', features: ['Private luxury suite', 'Personal concierge', 'R18,000 Tab', 'VIP parking pass'], hasQuantity: false, classSlug: 'package' }
  ];
  
  // Helper functions
  function loadEvents() {
    const stored = localStorage.getItem(EVENTS_KEY);
    if (stored) events = JSON.parse(stored);
    else events = [];
  }
  
  function saveEvents() {
    localStorage.setItem(EVENTS_KEY, JSON.stringify(events));
  }
  
  function loadTickets() { /* not needed for display, but used in checkout */ }
  
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }
  
  function animateToCart(element, emoji) {
    const rect = element.getBoundingClientRect();
    const cartBtn = document.getElementById('openCartBtn');
    const cartRect = cartBtn.getBoundingClientRect();
    const flying = document.createElement('div');
    flying.className = 'flying-item';
    flying.innerHTML = emoji;
    flying.style.left = rect.left + rect.width/2 - 20 + 'px';
    flying.style.top = rect.top + rect.height/2 - 20 + 'px';
    document.body.appendChild(flying);
    setTimeout(() => {
      flying.style.left = cartRect.left + cartRect.width/2 - 20 + 'px';
      flying.style.top = cartRect.top + cartRect.height/2 - 20 + 'px';
      flying.style.transform = 'scale(0.3) rotate(360deg)';
    }, 10);
    setTimeout(() => { flying.remove(); cartBtn.style.transform = 'scale(1.1)'; setTimeout(() => cartBtn.style.transform = '', 200); }, 1000);
  }
  
  function updateCartUI() {
    const subtotal = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
    document.getElementById('cartPrice').textContent = `R${subtotal.toLocaleString()}`;
    document.getElementById('cartTotal').textContent = `R${subtotal.toLocaleString()}`;
    const cartItemsDiv = document.getElementById('cartItems');
    if (cart.length === 0) {
      cartItemsDiv.innerHTML = '<div style="text-align:center;padding:2rem;color:#6B7280;">No items selected</div>';
      return;
    }
    cartItemsDiv.innerHTML = cart.map(item => `
      <div class="cart-item">
        <div class="cart-item-info">
          <div class="cart-item-name">${item.emoji} ${item.name}</div>
          <div class="cart-item-price">R${item.price.toLocaleString()} each</div>
        </div>
        <div class="cart-item-qty">
          <button class="qty-control" onclick="updateQuantity('${item.id}', -1)">-</button>
          <span>${item.quantity}</span>
          <button class="qty-control" onclick="updateQuantity('${item.id}', 1)">+</button>
        </div>
        <button style="background:none;border:none;color:#9CA3AF;cursor:pointer;font-size:1.2rem;" onclick="removeItem('${item.id}')">✕</button>
      </div>
    `).join('');
  }
  
  window.updateQuantity = function(id, delta) {
    const item = cart.find(i => i.id === id);
    if (item) {
      item.quantity += delta;
      if (item.quantity <= 0) cart = cart.filter(i => i.id !== id);
      updateCartUI();
    }
  };
  
  window.removeItem = function(id) {
    cart = cart.filter(i => i.id !== id);
    updateCartUI();
    showToast('Item removed');
  };
  
  function addToCart(product, element, quantity = 1) {
    if (element) animateToCart(element, product.emoji || '🎫');
    const existing = cart.find(i => i.id === product.id);
    if (existing) existing.quantity += quantity;
    else cart.push({ ...product, quantity });
    updateCartUI();
    showToast(`✓ Added ${quantity} x ${product.name}`);
  }
  
  // Render event tickets (Early Bird, General, VIP) based on selected event
  function renderEventTickets() {
    if (!selectedEventId) return [];
    const event = events.find(e => e.id === selectedEventId);
    if (!event) return [];
    const types = [
      { key: 'earlyBird', label: 'Early Bird', emoji: '🐦', desc: 'Limited early bird discount – act fast!', classSlug: 'earlybird', hasQuantity: true },
      { key: 'general', label: 'General Admission', emoji: '🎟️', desc: 'Standard entry wristband • Access to all areas', classSlug: 'general', hasQuantity: true },
      { key: 'vip', label: 'VIP Experience', emoji: '👑', desc: 'Premium wristband • Drinks included • Meet & greet', classSlug: 'vip', hasQuantity: true }
    ];
    return types.map(t => {
      const ticketData = event.ticketTypes[t.key];
      if (!ticketData) return null;
      const remaining = ticketData.capacity - ticketData.sold;
      const isSoldOut = remaining <= 0;
      return {
        id: `${event.id}_${t.key}`,
        name: t.label,
        price: ticketData.price,
        emoji: t.emoji,
        desc: t.desc,
        features: [`Price: R${ticketData.price.toLocaleString()}`, `Remaining: ${remaining} / ${ticketData.capacity}`, isSoldOut ? 'SOLD OUT' : 'Available now'],
        hasQuantity: t.hasQuantity,
        classSlug: t.classSlug,
        disabled: isSoldOut,
        eventId: event.id,
        ticketTypeKey: t.key
      };
    }).filter(p => p !== null);
  }
  
  // Render all products (event tickets + packages) based on selected category
  let currentCategory = 'tickets';
  function renderAll() {
    const container = document.getElementById('menuMain');
    const eventTickets = (currentCategory === 'tickets' && selectedEventId) ? renderEventTickets() : [];
    const packages = (currentCategory === 'packages') ? VENUE_PACKAGES : [];
    const products = [...eventTickets, ...packages];
    if (products.length === 0) {
      container.innerHTML = `<div style="text-align:center;padding:60px;color:var(--text-secondary);"><i class="fas fa-calendar-times"></i><h3>No items available</h3><p>${!selectedEventId ? 'Please select an active event from the dropdown above.' : 'No tickets defined for this event.'}</p></div>`;
      return;
    }
    container.innerHTML = `<div class="tickets-container">
      ${products.map(p => `
        <div class="ticket-card ${p.classSlug}" data-product-id="${p.id}">
          <div class="ticket-header">
            ${p.name === 'VIP Experience' ? '<div class="popular-badge">POPULAR</div>' : ''}
            <div class="ticket-type">${p.emoji} ${p.name}</div>
            <div class="ticket-price">R${p.price.toLocaleString()}</div>
            <p class="ticket-description">${p.desc}</p>
          </div>
          <div class="ticket-body">
            <ul class="features-list">
              ${p.features.map(f => `<li><span class="feature-icon"><i class="fas ${f.includes('SOLD') ? 'fa-times-circle' : 'fa-check-circle'}"></i></span> ${f}</li>`).join('')}
            </ul>
            ${p.hasQuantity && !p.disabled ? `
              <div class="quantity-selector" data-product-id="${p.id}">
                <button class="quantity-btn minus">−</button>
                <span class="quantity-display">1</span>
                <button class="quantity-btn plus">+</button>
              </div>
            ` : ''}
          </div>
          <div class="ticket-footer">
            <button class="buy-btn" data-product-id="${p.id}" ${p.disabled ? 'disabled style="opacity:0.5;"' : ''}>
              ${p.disabled ? 'Sold Out' : (p.hasQuantity ? 'Add Tickets' : 'Book Now')}
            </button>
          </div>
        </div>
      `).join('')}
    </div>`;
    
    // Attach quantity controls for each product
    document.querySelectorAll('.quantity-selector').forEach(selector => {
      const minus = selector.querySelector('.minus');
      const plus = selector.querySelector('.plus');
      const display = selector.querySelector('.quantity-display');
      if (minus && plus && display) {
        minus.addEventListener('click', (e) => {
          e.stopPropagation();
          let val = parseInt(display.textContent);
          if (val > 1) display.textContent = val - 1;
        });
        plus.addEventListener('click', (e) => {
          e.stopPropagation();
          let val = parseInt(display.textContent);
          if (val < 50) display.textContent = val + 1;
        });
      }
    });
    
    // Attach buy button events
    document.querySelectorAll('.buy-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const productId = btn.dataset.productId;
        let product;
        if (currentCategory === 'tickets' && selectedEventId) {
          product = renderEventTickets().find(p => p.id === productId);
        } else if (currentCategory === 'packages') {
          product = VENUE_PACKAGES.find(p => p.id === productId);
        }
        if (!product || product.disabled) return;
        const card = btn.closest('.ticket-card');
        let quantity = 1;
        if (product.hasQuantity) {
          const qtyDisplay = card.querySelector('.quantity-display');
          if (qtyDisplay) quantity = parseInt(qtyDisplay.textContent);
        }
        addToCart(product, card, quantity);
      });
    });
  }
  
  // Populate event selector dropdown
  function populateEventSelector() {
    const activeEvents = events.filter(e => e.status === 'active' || e.status === 'upcoming');
    const selector = document.getElementById('eventSelect');
    const container = document.getElementById('eventSelector');
    if (activeEvents.length === 0) {
      container.style.display = 'none';
      selectedEventId = null;
      if (currentCategory === 'tickets') renderAll();
      return;
    }
    container.style.display = 'flex';
    selector.innerHTML = activeEvents.map(e => `<option value="${e.id}" ${selectedEventId === e.id ? 'selected' : ''}>${escapeHtml(e.name)} (${formatDate(e.date)})</option>`).join('');
    if (!selectedEventId || !activeEvents.find(e => e.id === selectedEventId)) {
      selectedEventId = activeEvents[0].id;
      selector.value = selectedEventId;
    }
    selector.addEventListener('change', (e) => {
      selectedEventId = e.target.value;
      if (currentCategory === 'tickets') renderAll();
    });
  }
  
  // Checkout: create tickets in localStorage and update event sold counts
  function performCheckout() {
    if (cart.length === 0) { showToast('Cart is empty'); return; }
    // Load existing tickets
    let allTickets = [];
    const storedTickets = localStorage.getItem(TICKETS_KEY);
    if (storedTickets) allTickets = JSON.parse(storedTickets);
    
    // For each cart item, generate tickets
    for (const item of cart) {
      // Check if item is an event ticket (starts with eventId_)
      const isEventTicket = item.id.includes('_') && events.some(e => item.id.startsWith(e.id + '_'));
      if (isEventTicket) {
        const [eventId, ticketTypeKey] = item.id.split('_');
        const event = events.find(e => e.id === eventId);
        if (event && event.ticketTypes[ticketTypeKey]) {
          const ticketType = event.ticketTypes[ticketTypeKey];
          const newSold = ticketType.sold + item.quantity;
          if (newSold > ticketType.capacity) {
            showToast(`Not enough ${item.name} tickets available. Only ${ticketType.capacity - ticketType.sold} left.`, 'error');
            return;
          }
          // Update sold count
          ticketType.sold = newSold;
          // Create individual tickets
          for (let i = 0; i < item.quantity; i++) {
            const ticketId = `${eventId}_${ticketTypeKey}_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`;
            allTickets.push({
              ticketId: ticketId.toUpperCase(),
              attendeeName: `Guest ${ticketTypeKey}`,
              eventName: event.name,
              ticketType: item.name,
              checkedIn: false,
              checkinTime: null,
              price: item.price
            });
          }
        } else { showToast(`Event data error for ${item.name}`, 'error'); return; }
      } else {
        // Venue package: generate tickets with package name
        for (let i = 0; i < item.quantity; i++) {
          const ticketId = `${item.id}_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`;
          allTickets.push({
            ticketId: ticketId.toUpperCase(),
            attendeeName: `Package Guest`,
            eventName: 'Rands Cape Town Venue Package',
            ticketType: item.name,
            checkedIn: false,
            checkinTime: null,
            price: item.price
          });
        }
      }
    }
    // Save updated events and tickets
    saveEvents();
    localStorage.setItem(TICKETS_KEY, JSON.stringify(allTickets));
    // Dispatch storage event so other tabs (scanner, wallet) refresh
    window.dispatchEvent(new StorageEvent('storage', { key: TICKETS_KEY, newValue: JSON.stringify(allTickets) }));
    window.dispatchEvent(new StorageEvent('storage', { key: EVENTS_KEY, newValue: JSON.stringify(events) }));
    
    showToast(`✅ Checkout successful! Total: R${cart.reduce((s,i)=>s+i.price*i.quantity,0).toLocaleString()}. Tickets added to wallet.`);
    cart = [];
    updateCartUI();
    document.getElementById('cartSidebar').classList.remove('open');
    document.getElementById('cartOverlay').classList.remove('open');
    // Redirect to home page after 2 seconds
    setTimeout(() => { window.location.href = 'index.html'; }, 2000);
  }
  
  // UI Helpers
  function formatDate(dateString) { return dateString ? new Date(dateString).toLocaleDateString('en-ZA', { year:'numeric', month:'short', day:'numeric' }) : ''; }
  function escapeHtml(t) { if(!t) return ''; const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
  
  function setupCartSidebar() {
    const cartSidebar = document.getElementById('cartSidebar');
    const cartOverlay = document.getElementById('cartOverlay');
    document.getElementById('openCartBtn').addEventListener('click', () => { cartSidebar.classList.add('open'); cartOverlay.classList.add('open'); });
    document.getElementById('closeCartBtn').addEventListener('click', () => { cartSidebar.classList.remove('open'); cartOverlay.classList.remove('open'); });
    cartOverlay.addEventListener('click', () => { cartSidebar.classList.remove('open'); cartOverlay.classList.remove('open'); });
    document.getElementById('checkoutBtn').addEventListener('click', performCheckout);
  }
  
  // Theme Toggle
  const themeToggle = document.getElementById('themeToggleBtn');
  function setTheme(theme) {
    if (theme === 'light') { document.body.classList.remove('dark-mode'); document.body.classList.add('light-mode'); themeToggle.innerHTML = '<span>☀️</span><span>Light</span>'; localStorage.setItem('kioskTheme', 'light'); }
    else { document.body.classList.remove('light-mode'); document.body.classList.add('dark-mode'); themeToggle.innerHTML = '<span>🌙</span><span>Dark</span>'; localStorage.setItem('kioskTheme', 'dark'); }
  }
  const savedTheme = localStorage.getItem('kioskTheme');
  if (savedTheme === 'dark') setTheme('dark'); else setTheme('light');
  themeToggle.addEventListener('click', () => setTheme(document.body.classList.contains('dark-mode') ? 'light' : 'dark'));
  
  // Category tabs
  document.querySelectorAll('.category-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentCategory = tab.dataset.category;
      renderAll();
    });
  });
  
  // Initialization
  loadEvents();
  if (events.length === 0) {
    // Fallback demo event if none exists (so kiosk works out of the box)
    const demoEvent = {
      id: 'evt_demo_001',
      name: 'Rands 11th Birthday',
      date: new Date(Date.now() + 86400000).toISOString().split('T')[0],
      time: '18:00',
      location: 'Rands Cape Town',
      status: 'active',
      imageData: null,
      ticketTypes: {
        earlyBird: { price: 250, capacity: 200, sold: 45 },
        general: { price: 350, capacity: 500, sold: 120 },
        vip: { price: 600, capacity: 100, sold: 30 }
      }
    };
    events = [demoEvent];
    saveEvents();
  }
  selectedEventId = events.find(e => e.status === 'active')?.id || events[0]?.id;
  populateEventSelector();
  setupCartSidebar();
  renderAll();
  
  // Listen for storage changes from management panel
  window.addEventListener('storage', (e) => {
    if (e.key === EVENTS_KEY) {
      loadEvents();
      populateEventSelector();
      if (currentCategory === 'tickets') renderAll();
    }
  });
</script>
</body>
